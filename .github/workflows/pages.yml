name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate sync config
        env:
          SYNC_GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const enabled = Boolean(process.env.SYNC_GITHUB_TOKEN);
          const cfg = {
            enabled,
            owner: "Cymon-analysis",
            repo: "looker-project-checklist",
            branch: "main",
            token: process.env.SYNC_GITHUB_TOKEN || "",
          };
          fs.writeFileSync(
            "sync-config.js",
            `window.SYNC_CONFIG = ${JSON.stringify(cfg, null, 2)};\n`
          );
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
