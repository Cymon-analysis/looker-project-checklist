name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate config files
        env:
          SYNC_GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GEMINI_PROXY_URL: ${{ secrets.GEMINI_PROXY_URL }}
          GEMINI_PROXY_SECRET: ${{ secrets.GEMINI_PROXY_SECRET }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const syncCfg = {
            enabled: Boolean(process.env.SYNC_GITHUB_TOKEN),
            owner: "Cymon-analysis",
            repo: "looker-project-checklist",
            branch: "main",
            token: process.env.SYNC_GITHUB_TOKEN || "",
          };
          fs.writeFileSync(
            "sync-config.js",
            `window.SYNC_CONFIG = ${JSON.stringify(syncCfg, null, 2)};\n`
          );
          let proxyUrl = (process.env.GEMINI_PROXY_URL || "").trim().replace(/\/$/, "");
          let apiKey = (process.env.GEMINI_API_KEY || "").trim();
          if (!proxyUrl && /^https?:\/\//i.test(apiKey)) {
            proxyUrl = apiKey.replace(/\/$/, "");
            apiKey = "";
          }
          const geminiCfg = {
            enabled: Boolean(proxyUrl || apiKey),
            mode: proxyUrl ? "vertex-proxy" : "api-key",
            proxyUrl,
            proxySecret: process.env.GEMINI_PROXY_SECRET || "",
            apiKey,
            model: "gemini-2.5-flash-lite",
            googleOAuthClientId: (process.env.GOOGLE_OAUTH_CLIENT_ID || "").trim(),
          };
          fs.writeFileSync(
            "gemini-config.js",
            `window.GEMINI_CONFIG = ${JSON.stringify(geminiCfg, null, 2)};\n`
          );
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
